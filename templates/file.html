{{define "file.html"}}
{{template "header" .}}
<div class="file-view">
  <div class="file-view-header">
    <div class="file-view-title">
      <h1>{{.FileName}}</h1>
    </div>
    <div class="file-view-actions">
      <a href="{{.RawPath}}" class="btn btn-secondary" download>⬇️ 下载</a>
    </div>
  </div>

  <div class="file-content {{if .IsMarkdown}}markdown-body{{else}}code-body{{end}}">
    {{.Content}}
  </div>
</div>
{{template "footer" .}}
{{end}}
