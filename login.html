<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a73e8">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<title>🚀 WorkSpace 门禁</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.login-container{width:100%;max-width:400px;padding:20px}
.card{background:#fff;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:36px 32px;animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;font-size:52px;margin-bottom:12px;animation:bounce .6s .3s cubic-bezier(.22,1,.36,1) both}
@keyframes bounce{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
.title{text-align:center;font-size:26px;font-weight:700;color:#202124;margin-bottom:6px;letter-spacing:-.5px}
.subtitle{text-align:center;font-size:14px;color:#5f6368;margin-bottom:28px}
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:#3c4043;margin-bottom:8px}
input[type="text"],input[type="password"]{width:100%;padding:12px 14px;border:2px solid #e8eaed;border-radius:10px;font-size:15px;transition:all .2s ease;font-family:inherit;background:#f8f9fa}
input[type="text"]:focus,input[type="password"]:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 4px rgba(26,115,232,.15);background:#fff}
.checkbox-group{display:flex;align-items:center;gap:10px;margin-bottom:28px}
input[type="checkbox"]{width:18px;height:18px;border:2px solid #dadce0;border-radius:4px;cursor:pointer;accent-color:#1a73e8}
.checkbox-label{font-size:14px;color:#5f6368;cursor:pointer;user-select:none}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#1a73e8,#1558b0);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s ease;box-shadow:0 4px 12px rgba(26,115,232,.35);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,115,232,.45)}
.btn-login:active{transform:translateY(0) scale(.98);box-shadow:0 2px 8px rgba(26,115,232,.3);transition:all .1s}
.footer{text-align:center;font-size:12px;color:#9aa0a6;margin-top:20px}
.error-msg{color:#c62828;background:#ffebee;padding:12px 16px;border-radius:10px;margin-bottom:18px;text-align:center;font-size:14px;border:1px solid #ffcdd2;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@media(max-width:480px){
  .login-container{padding:16px}
  .card{padding:28px 20px;border-radius:16px}
  .logo{font-size:44px}
  .title{font-size:22px}
  input[type="text"],input[type="password"]{font-size:16px;padding:14px}
  .btn-login{padding:16px;font-size:17px;border-radius:12px}
  .checkbox-label{font-size:15px}
}
</style>
</head>
<body>
<div class="login-container">
<div class="card">
<div class="logo">🚀</div>
<div class="title">Workspace</div>
<div class="subtitle">安全访问工作区</div>
<form method="POST" id="loginForm">
<div class="form-group">
<label for="username">用户名</label>
<input type="text" id="username" name="username" placeholder="su600" required autofocus>
</div>
<div class="form-group">
<label for="password">密码</label>
<input type="password" id="password" name="password" placeholder="•••••••••" required>
</div>
<div class="checkbox-group">
<input type="checkbox" id="remember" name="remember">
<label for="remember" class="checkbox-label">记住我（30天）</label>
</div>
<button type="submit" class="btn-login">登 录</button>
</form>
<div class="footer">🔒 您的凭证已加密传输</div>
</div>
</div>
<script>
// 页面加载时恢复记住的用户名
document.addEventListener('DOMContentLoaded', function() {
  const saved = localStorage.getItem('workspace_user');
  if (saved) {
    document.getElementById('username').value = saved;
    document.getElementById('remember').checked = true;
    document.getElementById('password').focus();
  }
});

// 登录前保存用户名
document.getElementById('loginForm').addEventListener('submit', function() {
  if (document.getElementById('remember').checked) {
    localStorage.setItem('workspace_user', document.getElementById('username').value);
  } else {
    localStorage.removeItem('workspace_user');
  }
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
</script>
</body>
</html>
